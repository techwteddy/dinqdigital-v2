# Builds and validates the project on GitHub Actions (no Vercel required).
# Fork maintainers: add secrets only if you extend CI with integration tests.
# End users deploy to Vercel — see docs/CI_CD.md and vercel.json.

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure CI environment
        run: npm run ci:env

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package build output
        run: |
          tar -czf launchkit-build.tar.gz .next public package.json package-lock.json next.config.ts prisma

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: launchkit-build.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: launchkit-build.tar.gz
          retention-days: 7
          if-no-files-found: error
